spring.application.name=e-journal

spring.datasource.url=jdbc:postgresql://localhost:5432/ejournal
spring.datasource.username=ejournal_usr
spring.datasource.password=ejournal_pwd

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

#app.jwtSecret=YourSuperSecretKeyThatShouldBeAtLeast64BytesLongForHS512Algorithm
app.jwtSecret=ChXOzUTGtMGeRxHkFbhOnbrAjEBhnlttLB2w2biETpTPktQsyBr5LsCcu3bNlGou
app.jwtExpirationInMs=86400000

# Grant all roles to unauthenticated requests from 127.0.0.1 — set to false for staging/production
app.security.allow-localhost=true

# Directory where rotating log files are written (override in production via env var or -D flag)
app.logging.path=logs
logging.config=classpath:logback-spring.xml

#backend server port
server.port=8080

#bean actuator
management.endpoints.web.exposure.include=beans